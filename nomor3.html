<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulasi Interseksi Ray-Sphere Klasik</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- KaTeX CSS & JS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <!-- Import Map for Three.js -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body
    class="bg-gray-50 text-gray-800 font-sans h-screen flex flex-col md:flex-row overflow-hidden"
  >
    <!-- 3D Canvas Area (Left Side) -->
    <div
      class="w-full md:w-1/2 h-1/2 md:h-full relative bg-gray-900 border-b md:border-b-0 md:border-r border-gray-700"
    >
      <div id="canvas-container" class="w-full h-full"></div>
      <div
        class="absolute top-4 left-4 bg-black/60 text-white p-3 rounded-lg text-sm backdrop-blur-sm"
      >
        <h2 class="font-bold text-lg mb-1">Visualisasi 3D</h2>
        <ul class="space-y-1">
          <li>
            <span
              class="inline-block w-3 h-3 rounded-full bg-blue-500 mr-2"
            ></span>
            Kamera (Mata)
          </li>
          <li>
            <span
              class="inline-block w-3 h-3 rounded-full bg-green-500 mr-2"
            ></span>
            Piksel Layar
          </li>
          <li>
            <span
              class="inline-block w-3 h-3 rounded-full bg-yellow-400 mr-2"
            ></span>
            Titik Potong
          </li>
          <li>
            <span
              class="inline-block w-8 h-1 bg-red-500 mr-2 align-middle"
            ></span>
            Sinar (Ray)
          </li>
        </ul>
        <p class="mt-2 text-xs text-gray-300">
          Gunakan mouse untuk memutar/zoom kamera.
        </p>
      </div>
    </div>

    <!-- Controls & Math Area (Right Side) -->
    <div class="w-full md:w-1/2 h-1/2 md:h-full flex flex-col bg-white">
      <!-- Header -->
      <div class="p-4 border-b border-gray-200 bg-white shadow-sm z-10">
        <h1 class="text-2xl font-extrabold text-gray-800">
          Ray-Sphere Intersection
        </h1>
        <p class="text-sm text-gray-500">
          Perhitungan Matematika Klasik Step-by-Step
        </p>
      </div>

      <!-- Scrollable Content -->
      <div class="flex-1 overflow-y-auto p-6 space-y-6">
        <!-- Input Controls -->
        <div class="bg-gray-100 p-4 rounded-xl border border-gray-200">
          <h3
            class="font-bold text-gray-700 mb-3 border-b border-gray-300 pb-2"
          >
            Parameter Input
          </h3>

          <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <!-- Posisi Mata -->
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1"
                >Mata / Kamera (E)</label
              >
              <div class="flex space-x-2">
                <input
                  type="number"
                  id="ex"
                  value="0"
                  step="0.5"
                  class="w-full p-2 text-sm border rounded"
                  placeholder="X"
                />
                <input
                  type="number"
                  id="ey"
                  value="0"
                  step="0.5"
                  class="w-full p-2 text-sm border rounded"
                  placeholder="Y"
                />
                <input
                  type="number"
                  id="ez"
                  value="5"
                  step="0.5"
                  class="w-full p-2 text-sm border rounded"
                  placeholder="Z"
                />
              </div>
            </div>

            <!-- Posisi Layar -->
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1"
                >Piksel Layar (S)</label
              >
              <div class="flex space-x-2">
                <input
                  type="number"
                  id="px"
                  value="0"
                  step="0.5"
                  class="w-full p-2 text-sm border rounded"
                  placeholder="X"
                />
                <input
                  type="number"
                  id="py"
                  value="0"
                  step="0.5"
                  class="w-full p-2 text-sm border rounded"
                  placeholder="Y"
                />
                <input
                  type="number"
                  id="pz"
                  value="3"
                  step="0.5"
                  class="w-full p-2 text-sm border rounded"
                  placeholder="Z"
                />
              </div>
            </div>

            <!-- Translasi Bola -->
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1"
                >Posisi Bola (T)</label
              >
              <div class="flex space-x-2">
                <input
                  type="number"
                  id="tx"
                  value="0"
                  step="0.5"
                  class="w-full p-2 text-sm border rounded"
                  placeholder="X"
                />
                <input
                  type="number"
                  id="ty"
                  value="0"
                  step="0.5"
                  class="w-full p-2 text-sm border rounded"
                  placeholder="Y"
                />
                <input
                  type="number"
                  id="tz"
                  value="0"
                  step="0.5"
                  class="w-full p-2 text-sm border rounded"
                  placeholder="Z"
                />
              </div>
            </div>

            <!-- Skala Bola -->
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-1"
                >Skala / Ukuran Bola (S)</label
              >
              <div class="flex space-x-2">
                <input
                  type="number"
                  id="sx"
                  value="1"
                  step="0.1"
                  class="w-full p-2 text-sm border rounded"
                  placeholder="X"
                />
                <input
                  type="number"
                  id="sy"
                  value="1"
                  step="0.1"
                  class="w-full p-2 text-sm border rounded"
                  placeholder="Y"
                />
                <input
                  type="number"
                  id="sz"
                  value="1"
                  step="0.1"
                  class="w-full p-2 text-sm border rounded"
                  placeholder="Z"
                />
              </div>
            </div>
          </div>
        </div>

        <!-- Mathematical Output -->
        <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
          <h3
            class="font-bold text-gray-700 mb-4 border-b border-gray-200 pb-2"
          >
            Langkah Perhitungan
          </h3>
          <div id="math-output" class="text-sm overflow-x-auto text-gray-800">
            <!-- KaTeX will render here -->
          </div>
        </div>
      </div>
    </div>

    <!-- Application Logic -->
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      // State parameters
      const params = {
        ex: 0,
        ey: 0,
        ez: 5,
        px: 0,
        py: 0,
        pz: 3,
        tx: 0,
        ty: 0,
        tz: 0,
        sx: 1,
        sy: 1,
        sz: 1,
      };

      // DOM Elements
      const inputs = [
        "ex",
        "ey",
        "ez",
        "px",
        "py",
        "pz",
        "tx",
        "ty",
        "tz",
        "sx",
        "sy",
        "sz",
      ];
      inputs.forEach((id) => {
        document.getElementById(id).addEventListener("input", (e) => {
          let val = parseFloat(e.target.value);
          // Prevent zero scale to avoid divide by zero
          if (["sx", "sy", "sz"].includes(id) && val === 0) val = 0.001;
          params[id] = isNaN(val) ? 0 : val;
          calculateAndRender();
        });
      });

      // --- THREE.JS SETUP ---
      const container = document.getElementById("canvas-container");
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x111827); // Tailwind gray-900

      const camera = new THREE.PerspectiveCamera(
        45,
        container.clientWidth / container.clientHeight,
        0.1,
        100,
      );
      camera.position.set(8, 5, 10);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      container.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      // Lights
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(5, 10, 5);
      scene.add(dirLight);

      // Helpers
      const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
      scene.add(gridHelper);
      const axesHelper = new THREE.AxesHelper(3);
      scene.add(axesHelper);

      // Objects
      const sphereGeo = new THREE.SphereGeometry(1, 32, 32);
      const sphereMat = new THREE.MeshPhongMaterial({
        color: 0x8b5cf6,
        transparent: true,
        opacity: 0.6,
        wireframe: false,
      });
      const sphereMesh = new THREE.Mesh(sphereGeo, sphereMat);
      scene.add(sphereMesh);

      const pointGeo = new THREE.SphereGeometry(0.15, 16, 16);
      const eyeMesh = new THREE.Mesh(
        pointGeo,
        new THREE.MeshBasicMaterial({ color: 0x3b82f6 }),
      ); // Blue
      const pixelMesh = new THREE.Mesh(
        pointGeo,
        new THREE.MeshBasicMaterial({ color: 0x22c55e }),
      ); // Green
      scene.add(eyeMesh);
      scene.add(pixelMesh);

      const hitGeo = new THREE.SphereGeometry(0.2, 16, 16);
      const hitMat = new THREE.MeshBasicMaterial({ color: 0xfacc15 }); // Yellow
      const hitMesh1 = new THREE.Mesh(hitGeo, hitMat);
      const hitMesh2 = new THREE.Mesh(hitGeo, hitMat);
      scene.add(hitMesh1);
      scene.add(hitMesh2);

      const rayMat = new THREE.LineBasicMaterial({
        color: 0xef4444,
        linewidth: 2,
      });
      const rayGeo = new THREE.BufferGeometry();
      const rayLine = new THREE.Line(rayGeo, rayMat);
      scene.add(rayLine);

      // Resize handler
      window.addEventListener("resize", () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
      });

      // Animation loop
      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      // --- MATH & UPDATE LOGIC ---

      function f(num) {
        return Number(num.toFixed(3));
      }

      function calculateAndRender() {
        // 1. Vector Math (World)
        let dx = params.px - params.ex;
        let dy = params.py - params.ey;
        let dz = params.pz - params.ez;
        let len = Math.sqrt(dx * dx + dy * dy + dz * dz);

        // Arah yang dinormalisasi
        let Dxw = dx / len;
        let Dyw = dy / len;
        let Dzw = dz / len;

        // 2. Inverse Local Transform (Manual calculation for equations)
        let m00 = 1 / params.sx;
        let m03 = -params.tx / params.sx;
        let m11 = 1 / params.sy;
        let m13 = -params.ty / params.sy;
        let m22 = 1 / params.sz;
        let m23 = -params.tz / params.sz;

        let Elx = m00 * params.ex + m03;
        let Ely = m11 * params.ey + m13;
        let Elz = m22 * params.ez + m23;

        // D vector has w=0, so translation is ignored
        let Dlx = m00 * Dxw;
        let Dly = m11 * Dyw;
        let Dlz = m22 * Dzw;

        // 3. Quadratic Equation Coefficients
        let a = Dlx * Dlx + Dly * Dly + Dlz * Dlz;
        let b = 2 * (Elx * Dlx + Ely * Dly + Elz * Dlz);
        let c = Elx * Elx + Ely * Ely + Elz * Elz - 1;

        // 4. Discriminant
        let delta = b * b - 4 * a * c;

        // 5. Roots & Hits
        let t1 = null,
          t2 = null,
          t_hit = null;
        let hitX1 = null,
          hitY1 = null,
          hitZ1 = null;
        let hitX2 = null,
          hitY2 = null,
          hitZ2 = null;

        if (delta >= 0) {
          t1 = (-b - Math.sqrt(delta)) / (2 * a);
          t2 = (-b + Math.sqrt(delta)) / (2 * a);

          // Cari titik potong terdekat di depan mata (t > 0)
          if (t1 > 0 && t2 > 0) t_hit = Math.min(t1, t2);
          else if (t1 > 0) t_hit = t1;
          else if (t2 > 0) t_hit = t2;

          hitX1 = params.ex + t1 * Dxw;
          hitY1 = params.ey + t1 * Dyw;
          hitZ1 = params.ez + t1 * Dzw;

          hitX2 = params.ex + t2 * Dxw;
          hitY2 = params.ey + t2 * Dyw;
          hitZ2 = params.ez + t2 * Dzw;
        }

        // --- Update 3D Scene ---
        sphereMesh.position.set(params.tx, params.ty, params.tz);
        sphereMesh.scale.set(params.sx, params.sy, params.sz);

        eyeMesh.position.set(params.ex, params.ey, params.ez);
        pixelMesh.position.set(params.px, params.py, params.pz);

        // Perpanjang sinar 50 unit ke depan
        const rayEnd = new THREE.Vector3(
          params.ex + Dxw * 50,
          params.ey + Dyw * 50,
          params.ez + Dzw * 50,
        );
        rayGeo.setFromPoints([
          new THREE.Vector3(params.ex, params.ey, params.ez),
          rayEnd,
        ]);

        if (delta >= 0 && t1 > 0) {
          hitMesh1.position.set(hitX1, hitY1, hitZ1);
          hitMesh1.visible = true;
        } else {
          hitMesh1.visible = false;
        }

        if (delta > 0 && t2 > 0) {
          hitMesh2.position.set(hitX2, hitY2, hitZ2);
          hitMesh2.visible = true;
        } else {
          hitMesh2.visible = false;
        }

        // --- Generate HTML & KaTeX String ---
        function renderMath(tex) {
          return katex.renderToString(tex, {
            displayMode: true,
            throwOnError: false,
          });
        }

        let html = `
                <div class="mb-6">
                    <div class="font-bold text-gray-800 text-base border-b pb-1 mb-2">1. Vektor Arah Sinar (D<sub>world</sub>)</div>
                    <div class="text-sm text-gray-600 mb-2">Sinar melaju dari Mata (E) melewati Piksel Layar (S). Vektor D didapat dengan mengurangi titik lalu menormalisasinya (membagi dengan panjangnya).</div>
                    ${renderMath(String.raw`\begin{aligned}
                    S - E &= \begin{bmatrix} ${f(params.px)} - (${f(params.ex)}) \\ ${f(params.py)} - (${f(params.ey)}) \\ ${f(params.pz)} - (${f(params.ez)}) \end{bmatrix} = \begin{bmatrix} ${f(dx)} \\ ${f(dy)} \\ ${f(dz)} \end{bmatrix} \\
                    |S - E| &= \sqrt{(${f(dx)})^2 + (${f(dy)})^2 + (${f(dz)})^2} = ${f(len)} \\
                    D_{world} &= \frac{S - E}{|S - E|} = \begin{bmatrix} \frac{${f(dx)}}{${f(len)}} \\ \frac{${f(dy)}}{${f(len)}} \\ \frac{${f(dz)}}{${f(len)}} \end{bmatrix} = \begin{bmatrix} ${f(Dxw)} \\ ${f(Dyw)} \\ ${f(Dzw)} \end{bmatrix}
                    \end{aligned}`)}
                </div>
                
                <div class="mb-6">
                    <div class="font-bold text-gray-800 text-base border-b pb-1 mb-2">2. Matriks Invers Transformasi (M<sup>-1</sup>)</div>
                    <div class="text-sm text-gray-600 mb-2">Daripada mengubah persamaan bola, kita menarik sinar ke ruang lokal bola dengan matriks invers. Kita hitung hasil perkalian matriks <b>S<sup>-1</sup> &times; T<sup>-1</sup></b>.</div>
                    ${renderMath(String.raw`S^{-1} = \begin{bmatrix} ${f(1 / params.sx)} & 0 & 0 & 0 \\ 0 & ${f(1 / params.sy)} & 0 & 0 \\ 0 & 0 & ${f(1 / params.sz)} & 0 \\ 0 & 0 & 0 & 1 \end{bmatrix}, \quad
                    T^{-1} = \begin{bmatrix} 1 & 0 & 0 & ${f(-params.tx)} \\ 0 & 1 & 0 & ${f(-params.ty)} \\ 0 & 0 & 1 & ${f(-params.tz)} \\ 0 & 0 & 0 & 1 \end{bmatrix}`)}
                    ${renderMath(String.raw`\begin{aligned} M^{-1} = S^{-1} \times T^{-1} &= \begin{bmatrix} 
                    ${f(1 / params.sx)} \cdot 1 & 0 & 0 & ${f(1 / params.sx)} \cdot (${f(-params.tx)}) \\ 
                    0 & ${f(1 / params.sy)} \cdot 1 & 0 & ${f(1 / params.sy)} \cdot (${f(-params.ty)}) \\ 
                    0 & 0 & ${f(1 / params.sz)} \cdot 1 & ${f(1 / params.sz)} \cdot (${f(-params.tz)}) \\ 
                    0 & 0 & 0 & 1 \cdot 1 \end{bmatrix} \\
                    &= \begin{bmatrix} 
                    ${f(m00)} & 0 & 0 & ${f(m03)} \\ 
                    0 & ${f(m11)} & 0 & ${f(m13)} \\ 
                    0 & 0 & ${f(m22)} & ${f(m23)} \\ 
                    0 & 0 & 0 & 1 \end{bmatrix} \end{aligned}`)}
                </div>

                <div class="mb-6">
                    <div class="font-bold text-gray-800 text-base border-b pb-1 mb-2">3. Transformasi Sinar ke Ruang Lokal</div>
                    <div class="text-sm text-gray-600 mb-2">Titik Mata (E) memiliki bobot w=1 (translasi berlaku). Vektor (D) memiliki w=0 (translasi dikalikan nol, hanya skala yang berlaku).</div>
                    ${renderMath(String.raw`\begin{aligned} 
                    E_{local} &= M^{-1} \begin{bmatrix} ${f(params.ex)} \\ ${f(params.ey)} \\ ${f(params.ez)} \\ 1 \end{bmatrix} = \begin{bmatrix} (${f(m00)})(${f(params.ex)}) + (${f(m03)})(1) \\ (${f(m11)})(${f(params.ey)}) + (${f(m13)})(1) \\ (${f(m22)})(${f(params.ez)}) + (${f(m23)})(1) \end{bmatrix} = \begin{bmatrix} ${f(Elx)} \\ ${f(Ely)} \\ ${f(Elz)} \end{bmatrix} \\
                    \\
                    D_{local} &= M^{-1} \begin{bmatrix} ${f(Dxw)} \\ ${f(Dyw)} \\ ${f(Dzw)} \\ 0 \end{bmatrix} = \begin{bmatrix} (${f(m00)})(${f(Dxw)}) + (${f(m03)})(0) \\ (${f(m11)})(${f(Dyw)}) + (${f(m13)})(0) \\ (${f(m22)})(${f(Dzw)}) + (${f(m23)})(0) \end{bmatrix} = \begin{bmatrix} ${f(Dlx)} \\ ${f(Dly)} \\ ${f(Dlz)} \end{bmatrix}
                    \end{aligned}`)}
                </div>

                <div class="mb-6">
                    <div class="font-bold text-gray-800 text-base border-b pb-1 mb-2">4. Persamaan Kuadrat Perpotongan Bola</div>
                    <div class="text-sm text-gray-600 mb-2">Substitusi sinar P(t) = E<sub>local</sub> + tD<sub>local</sub> ke dalam persamaan bola standar x² + y² + z² = 1</div>
                    ${renderMath(String.raw`\begin{aligned}
                    a &= D_{local} \cdot D_{local} \\
                      &= (${f(Dlx)})^2 + (${f(Dly)})^2 + (${f(Dlz)})^2 = ${f(Dlx * Dlx)} + ${f(Dly * Dly)} + ${f(Dlz * Dlz)} = \textbf{${f(a)}} \\
                    b &= 2(E_{local} \cdot D_{local}) \\
                      &= 2 \left( (${f(Elx)})(${f(Dlx)}) + (${f(Ely)})(${f(Dly)}) + (${f(Elz)})(${f(Dlz)}) \right) = 2 \left( ${f(Elx * Dlx + Ely * Dly + Elz * Dlz)} \right) = \textbf{${f(b)}} \\
                    c &= (E_{local} \cdot E_{local}) - 1 \\
                      &= \left( (${f(Elx)})^2 + (${f(Ely)})^2 + (${f(Elz)})^2 \right) - 1 = (${f(Elx * Elx + Ely * Ely + Elz * Elz)}) - 1 = \textbf{${f(c)}}
                    \end{aligned}`)}
                </div>

                <div class="mb-6">
                    <div class="font-bold text-gray-800 text-base border-b pb-1 mb-2">5. Diskriminan dan Akar (&Delta; = b² - 4ac)</div>
                    ${renderMath(String.raw`\begin{aligned} \Delta &= (${f(b)})^2 - 4(${f(a)})(${f(c)}) \\
                    \Delta &= (${f(b * b)}) - (${f(4 * a * c)}) = \textbf{${f(delta)}} \end{aligned}`)}
            `;

        if (delta < 0) {
          html += `<div class="mt-4 p-3 bg-red-50 text-red-700 rounded-lg border border-red-200 font-semibold text-center">&Delta; < 0 &rArr; Sinar tidak memotong bola (Meleset).</div>`;
        } else {
          html += renderMath(
            String.raw`\Delta \ge 0 \implies \text{Terjadi Perpotongan.} \\ t_{1,2} = \frac{-(${f(b)}) \pm \sqrt{${f(delta)}}}{2(${f(a)})} \implies t_1 = ${f(t1)}, \quad t_2 = ${f(t2)}`,
          );

          if (t_hit !== null) {
            html += `
                    <div class="mt-8 mb-6">
                        <div class="font-bold text-gray-800 text-base border-b pb-1 mb-2">6. Titik Potong Terdekat di Ruang Dunia</div>
                        <div class="text-sm text-gray-600 mb-2">Pilih t positif terkecil: t<sub>hit</sub> = ${f(t_hit)}</div>
                        ${renderMath(String.raw`\begin{aligned} 
                        P_{hit} &= E_{world} + t_{hit} D_{world} \\
                        P_{hit} &= \begin{bmatrix} ${f(params.ex)} \\ ${f(params.ey)} \\ ${f(params.ez)} \end{bmatrix} + 
                        ${f(t_hit)} \begin{bmatrix} ${f(Dxw)} \\ ${f(Dyw)} \\ ${f(Dzw)} \end{bmatrix} \\
                        P_{hit} &= \begin{bmatrix} ${f(params.ex)} \\ ${f(params.ey)} \\ ${f(params.ez)} \end{bmatrix} + \begin{bmatrix} ${f(t_hit * Dxw)} \\ ${f(t_hit * Dyw)} \\ ${f(t_hit * Dzw)} \end{bmatrix} = \begin{bmatrix} \color{blue} ${f(hitX1)} \\ \color{blue} ${f(hitY1)} \\ \color{blue} ${f(hitZ1)} \end{bmatrix}
                        \end{aligned}`)}
                        <div class="mt-2 text-sm text-gray-700">
                    <p>• <b>Titik Terdekat:</b> Adalah matriks Phit yang diwarnai biru</p>
                    <p>• <b>Titik Terjauh:</b> Adalah matriks Phit yang diwarnai hitam</p>
                </div>
                    </div>`;
          } else {
            html += `<div class="mt-4 p-3 bg-red-50 text-red-700 rounded-lg border border-red-200 font-semibold text-center">Perpotongan terjadi di belakang kamera (t < 0). Objek tidak terlihat.</div>`;
          }
        }

        // Memasukkan hasil gabungan HTML dan Render KaTeX ke dalam container
        document.getElementById("math-output").innerHTML = html;
      }

      // Initialize at startup
      calculateAndRender();
    </script>
  </body>
</html>
